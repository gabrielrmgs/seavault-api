# HTTP
quarkus.http.port=8080

# Logging
quarkus.log.level=INFO
quarkus.log.category."br.dev.irontech.seavault".level=INFO
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
%prod.quarkus.log.console.json.enabled=true
%prod.quarkus.log.level=INFO

# Datasource (produção via variáveis de ambiente; dev/test usam Dev Services)
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.jdbc.min-size=10
%prod.quarkus.datasource.jdbc.max-size=50
%prod.quarkus.datasource.jdbc.acquisition-timeout=5S
%prod.quarkus.datasource.jdbc.background-validation-interval=2M

# Hibernate / ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://seavault.irontech.dev.br
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:privateKey.pem}
seavault.jwt.access-ttl-seconds=900
seavault.jwt.refresh-ttl-days=30
seavault.auth.confirm-token-ttl-hours=48
seavault.auth.reset-token-ttl-hours=2
seavault.app.base-url=http://localhost:8080
%prod.seavault.app.base-url=${SEAVAULT_APP_BASE_URL}
seavault.legal.terms-version=2026-06-29

# PII encryption key (32 bytes base64)
seavault.pii.key=MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
%prod.seavault.pii.key=${SEAVAULT_PII_KEY}

# Rate limiting (auth)
seavault.auth.rate-limit.max-attempts=10
seavault.auth.rate-limit.window-seconds=60
seavault.auth.rate-limit.trusted-proxies=
quarkus.cache.caffeine."auth-rate-limit".expire-after-write=120S
quarkus.cache.caffeine."auth-rate-limit".maximum-size=100000
%test.seavault.auth.rate-limit.max-attempts=10000

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true
%prod.quarkus.http.cors.origins=${SEAVAULT_CORS_ORIGINS}

# Security headers
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."Referrer-Policy".value=strict-origin-when-cross-origin
%prod.quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains

# Request limits and timeouts
quarkus.http.limits.max-body-size=12M
quarkus.http.read-timeout=30S
quarkus.http.idle-timeout=30S

# Mailer (mock em dev/test; real em prod via env)
quarkus.mailer.from=no-reply@seavault.irontech.dev.br
%dev.quarkus.mailer.mock=true
%test.quarkus.mailer.mock=true

# Files / storage
seavault.files.local.base-dir=${SEAVAULT_FILES_DIR:./data/files}
seavault.files.max-size-bytes=10485760
seavault.files.allowed-content-types=application/pdf,image/jpeg,image/png
%test.seavault.files.local.base-dir=${java.io.tmpdir}/seavault-files-test
%test.seavault.files.max-size-bytes=1024

# Expiry / status de vencimento (janela "vencendo", em dias)
seavault.expiry.warning-days=30

# Alertas / job diario
seavault.alerts.cron=0 0 6 * * ?
seavault.alerts.max-window-days=90
seavault.alerts.voyage-reminder-days=180
%test.quarkus.scheduler.enabled=false

# OpenAPI
quarkus.smallrye-openapi.info-title=SeaVault API
quarkus.smallrye-openapi.info-version=1.0.0
%prod.quarkus.smallrye-openapi.enable=false
%prod.quarkus.swagger-ui.enable=false
